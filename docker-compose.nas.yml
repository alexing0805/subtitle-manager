services:
  subtitle-manager:
    build: .
    image: alexwjxing/subtitle-manager:latest
    container_name: subtitle-manager
    restart: unless-stopped
    ports:
      - "18080:8080"
    environment:
      MOVIE_DIR: "/video/movies"
      TV_DIR: "/video/tvshows"
      ANIME_DIR: "/video/anime"
      SCAN_INTERVAL: "30"
      LOG_LEVEL: "INFO"
      SUBTITLE_SOURCES: "shooter,assrt,opensubtitles,subhd"
      AUTO_DOWNLOAD: "true"
      MIN_FILE_SIZE_MB: "100"
      MAX_CONCURRENT_DOWNLOADS: "3"
    volumes:
      - nas-video:/video:ro
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nas-video:
    driver: local
    driver_opts:
      type: cifs
      o: "username=<nas-user>,password=<nas-password>,vers=3.0,ro"
      device: "//<nas-host>/<share-name>"
